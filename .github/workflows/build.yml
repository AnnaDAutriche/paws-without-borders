name: Build Android AAB (Release Signed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"

      - name: Install dependencies
        run: flutter pub get

      # ✅ FIX: regenerate Android project
      - name: Fix Android project structure
        run: flutter create .

      # ✅ Restore keystore
      - name: Restore keystore
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_B64 }}" | base64 -d > android/app/upload-keystore.jks

          cat > android/key.properties << EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.UPLOAD_STORE_PASSWORD }}
          keyPassword=${{ secrets.UPLOAD_KEY_PASSWORD }}
          keyAlias=${{ secrets.UPLOAD_KEY_ALIAS }}
          EOF

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/bundle/release/app-release.aab
