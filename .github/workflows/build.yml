name: Build Android AAB (Release Signed)
on:
  push:
    branches:
      - main
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Show Flutter version
        run: flutter --version
      - name: Clean project
        run: flutter clean
      - name: Install dependencies
        run: flutter pub get
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons
      - name: Restore Android signing files
        shell: bash
        run: |
          mkdir -p android/app
          echo "${{ secrets.UPLOAD_KEYSTORE_B64 }}" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=../app/upload-keystore.jks
          storePassword=${{ secrets.UPLOAD_STORE_PASSWORD }}
          keyPassword=${{ secrets.UPLOAD_KEY_PASSWORD }}
          keyAlias=${{ secrets.UPLOAD_KEY_ALIAS }}
          EOF
          test -f android/app/upload-keystore.jks
          test -f android/key.properties
      - name: Verify Android files
        shell: bash
        run: |
          ls -la android
          ls -la android/app
      - name: Build signed release AAB
        run: flutter build appbundle --release --build-number=${{ github.run_number }}
      - name: Verify AAB exists
        shell: bash
        run: |
          ls -la build/app/outputs/bundle/release
          test -f build/app/outputs/bundle/release/app-release.aab
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
