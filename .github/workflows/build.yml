name: Build Android AAB (Release Signed)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      PACKAGE_NAME: com.anna.pawswithoutborders

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android signing files
        shell: bash
        run: |
          mkdir -p android/app

          echo "${{ secrets.UPLOAD_KEYSTORE_B64 }}" | base64 --decode > android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.UPLOAD_STORE_PASSWORD }}
          keyPassword=${{ secrets.UPLOAD_KEY_PASSWORD }}
          keyAlias=${{ secrets.UPLOAD_KEY_ALIAS }}
          EOF

          test -f android/app/upload-keystore.jks
          test -f android/key.properties

      - name: Restore google-services.json (if Firebase is used)
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > android/app/google-services.json
            test -f android/app/google-services.json
            echo "google-services.json restored"
          else
            echo "GOOGLE_SERVICES_JSON_B64 not set - skipping"
          fi

      - name: Verify important Android files
        shell: bash
        run: |
          echo "Listing android directory"
          ls -la android
          echo "Listing android/app directory"
          ls -la android/app

      - name: Build signed release AAB
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Verify AAB exists
        shell: bash
        run: |
          ls -la build/app/outputs/bundle/release
          test -f build/app/outputs/bundle/release/app-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
``
