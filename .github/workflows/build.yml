name: Build Android AAB (Release Signed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Sanity check project root
        shell: bash
        run: |
          echo "PWD=$(pwd)"
          ls -la
          test -f pubspec.yaml

      - name: Install Dart dependencies
        run: flutter pub get

      # ✅ Fix for: "Your app is using an unsupported Gradle project"
      # Flutter itself recommends regenerating the Android project structure.
      - name: Regenerate Android project structure
        run: flutter create .

      - name: Restore keystore + key.properties
        shell: bash
        run: |
          # Decode keystore from GitHub Secret into android/app (Gradle expects it there)
          echo "${{ secrets.UPLOAD_KEYSTORE_B64 }}" | base64 -d > android/app/upload-keystore.jks

          # Create android/key.properties used by android/app/build.gradle
          cat > android/key.properties << EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.UPLOAD_STORE_PASSWORD }}
          keyPassword=${{ secrets.UPLOAD_KEY_PASSWORD }}
          keyAlias=${{ secrets.UPLOAD_KEY_ALIAS }}
          EOF

          test -f android/app/upload-keystore.jks
          test -f android/key.properties

      # ✅ Re-apply a known-good android/app/build.gradle so release signing never falls back to debug
      - name: Write android/app/build.gradle (release-safe)
        shell: bash
        run: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "com.google.gms.google-services"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace = "com.anna.pawswithoutborders"
              compileSdk = flutter.compileSdkVersion
              ndkVersion = "27.0.12077973"

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_11
                  targetCompatibility = JavaVersion.VERSION_11
              }

              kotlinOptions {
                  jvmTarget = JavaVersion.VERSION_11.toString()
              }

              signingConfigs {
                  release {
                      if (keystorePropertiesFile.exists()) {
                          keyAlias keystoreProperties["keyAlias"]
                          keyPassword keystoreProperties["keyPassword"]
                          storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                          storePassword keystoreProperties["storePassword"]
                      }
                  }
              }

              defaultConfig {
                  applicationId "com.anna.pawswithoutborders"
                  minSdk = flutter.minSdkVersion
                  targetSdk = flutter.targetSdkVersion

                  // IMPORTANT: bump versionCode for every Play upload
                  versionCode 2
                  versionName "1.0.1"
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source = "../.."
          }
          EOF

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Verify AAB exists
        shell: bash
        run: |
          ls -la build/app/outputs/bundle/release || true
          test -f build/app/outputs/bundle/release/app-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
