name: Generate Upload Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -storepass "${{ secrets.UPLOAD_STORE_PASSWORD }}" \
            -keypass "${{ secrets.UPLOAD_KEY_PASSWORD }}" \
            -alias "${{ secrets.UPLOAD_KEY_ALIAS }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Paws Without Borders, OU=App, O=Anna, L=Salzburg, S=Salzburg, C=AT"

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: upload-keystore.jks
