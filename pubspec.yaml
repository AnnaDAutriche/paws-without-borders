name: paws_without_borders
description: "Paws New Home - connecting you with animal shelters and their adorable residents, designed with a clean, elegant interface to help furry friends find their forever homes."
publish_to: "none"
version: 1.0.0+6

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  shared_preferences: ^2.0.0
  url_launcher: ^6.0.0
  cached_network_image: ^3.0.0
  image: ^4.0.0
  image_picker: ">=1.1.2"
  firebase_core: ^4.6.0
  firebase_auth: ">=5.3.3"
  cloud_firestore: ">=5.5.0"
  firebase_storage: ^13.0.0
  sqflite: ^2.4.2
  jni: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/Designer.png
  remove_alpha_ios: true
